```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Artwork Gallery</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f5f7fb;
font-family:Arial,sans-serif;
}

.gallery-title{
text-align:center;
margin:40px 0;
color:#6c63ff;
font-weight:bold;
}

.card{
border:none;
border-radius:20px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,.1);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
height:250px;
width:100%;
object-fit:cover;
}

.action-buttons{
margin-top:10px;
font-size:15px;
}

.action-buttons span{
margin-right:15px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h1 class="gallery-title">
🎨 Children's Artwork Gallery
</h1>

<div
class="row g-4"
id="galleryContainer">

</div>

</div>

<script>

let artworks =
JSON.parse(
localStorage.getItem("artworks")
) || [];

const gallery =
document.getElementById(
"galleryContainer"
);

displayArtworks();

function displayArtworks(){

gallery.innerHTML = "";

if(artworks.length === 0){

gallery.innerHTML = `

<div class="col-12">

<div class="alert alert-info text-center">

No artworks uploaded yet.
Upload artwork from Dashboard.

</div>

</div>

`;

return;

}

artworks.forEach((art,index)=>{

gallery.innerHTML += `

<div class="col-md-4">

<div class="card">

<img
src="${art.image}"
alt="Artwork">

<div class="card-body">

<h5>
${art.caption}
</h5>

<div class="action-buttons">

<span>❤️ Like</span>

<span>💬 Comment</span>

<span>📤 Share</span>

</div>

<button
class="btn btn-danger mt-3 w-100"
onclick="deleteArtwork(${index})">

🗑 Delete Post

</button>

</div>

</div>

</div>

`;

});

}

function deleteArtwork(index){

if(
confirm(
"Are you sure you want to delete this artwork?"
)
){

artworks.splice(index,1);

localStorage.setItem(
"artworks",
JSON.stringify(artworks)
);

displayArtworks();

}

}

</script>

</body>
</html>
```
