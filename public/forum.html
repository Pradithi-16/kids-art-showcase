<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Parent Community Forum</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f5f7fb;
font-family:Arial,sans-serif;
}

.header{
background:linear-gradient(135deg,#6c63ff,#8e7dff);
color:white;
padding:40px;
text-align:center;
}

.forum-box{
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
margin-top:30px;
}

.discussion-card{
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
margin-bottom:20px;
}

.action-btns{
margin-top:10px;
font-size:14px;
cursor:pointer;
}

.action-btns span{
margin-right:20px;
}

</style>

</head>

<body>

<div class="header">

<h1>
💬 Parent Community Forum
</h1>

<p>
Connect, Share Ideas and Support Young Artists
</p>

</div>

<div class="container">

<div class="forum-box">

<h3>
Create Discussion
</h3>

<textarea
id="forumPost"
class="form-control mt-3"
rows="4"
placeholder="Share your thoughts, ideas, parenting tips or art-related questions...">
</textarea>

<button
class="btn btn-primary mt-3"
onclick="addDiscussion()">

Post Discussion

</button>

</div>

<h3 class="mt-5 mb-4">
Recent Discussions
</h3>

<div id="discussionContainer">

</div>

</div>

<script>

loadDiscussions();

function addDiscussion(){

const text =
document.getElementById(
"forumPost"
).value;

if(text.trim()===""){

alert(
"Please enter a discussion."
);

return;

}

let discussions =
JSON.parse(
localStorage.getItem(
"discussions"
)
) || [];

discussions.unshift({

content:text,

date:new Date().toLocaleString()

});

localStorage.setItem(

"discussions",

JSON.stringify(
discussions
)

);

document.getElementById(
"forumPost"
).value="";

loadDiscussions();

alert(
"Discussion Posted Successfully!"
);

}

function loadDiscussions(){

const container =
document.getElementById(
"discussionContainer"
);

let discussions =
JSON.parse(
localStorage.getItem(
"discussions"
)
) || [];

container.innerHTML="";

if(discussions.length===0){

container.innerHTML=`

<div class="alert alert-info">

No discussions yet.
Start the first discussion!

</div>

`;

return;

}

discussions.forEach(item=>{

container.innerHTML+=`

<div class="discussion-card">

<h5>
👨‍👩‍👧 Parent Discussion
</h5>

<p>
${item.content}
</p>

<small>
📅 ${item.date}
</small>

<div class="action-btns">

<span>👍 Like</span>

<span>💬 Comment</span>

<span>📤 Share</span>

</div>

</div>

`;

});

}

</script>

</body>
</html>
