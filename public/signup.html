```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Signup - Creative Kids Portal</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#84fab0,#8fd3f4);
font-family:Arial;
}

.signup-container{
width:100%;
max-width:500px;
background:white;
padding:40px;
border-radius:25px;
box-shadow:0 10px 30px rgba(0,0,0,.2);
}

.logo{
text-align:center;
font-size:2rem;
font-weight:bold;
color:#ff6b6b;
margin-bottom:20px;
}

.form-control,
.form-select{
border-radius:15px;
padding:12px;
}

.btn-signup{
width:100%;
border:none;
padding:12px;
border-radius:15px;
background:#28a745;
color:white;
font-weight:bold;
}

.btn-signup:hover{
background:#218838;
}

</style>
</head>

<body>

<div class="signup-container">

<div class="logo">
🎨 Creative Kids
</div>

<h3 class="text-center mb-4">
Create Account
</h3>

<form id="signupForm">

<div class="mb-3">
<label>Full Name</label>
<input
type="text"
class="form-control"
id="name"
required>
</div>

<div class="mb-3">
<label>Email</label>
<input
type="email"
class="form-control"
id="email"
required>
</div>

<div class="mb-3">
<label>Password</label>
<input
type="password"
class="form-control"
id="password"
required>
</div>

<div class="mb-3">
<label>Role</label>

<select
class="form-select"
id="role">

<option value="parent">
Parent
</option>

<option value="admin">
Teacher/Admin
</option>

</select>

</div>

<button
type="submit"
class="btn-signup">

Create Account

</button>

</form>

</div>

<script>

document
.getElementById("signupForm")
.addEventListener(
"submit",
function(e){

e.preventDefault();

alert(
"Account Created Successfully!"
);

window.location.href = "dashboard.html";

});

</script>

</body>
</html>
```
