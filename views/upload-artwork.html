<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Upload Artwork</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="/css/style.css">

<style>

.upload-container{
max-width:800px;
margin:50px auto;
background:white;
padding:40px;
border-radius:25px;
box-shadow:0 10px 25px rgba(0,0,0,.1);
}

.preview{
width:100%;
max-height:400px;
object-fit:cover;
border-radius:15px;
display:none;
margin-top:20px;
}

</style>

</head>

<body>

<div class="container">

<div class="upload-container">

<h2 class="text-center mb-4">
🎨 Upload Artwork
</h2>

<form>

<div class="mb-3">

<label>Artwork Title</label>

<input
type="text"
class="form-control"
placeholder="Enter artwork title">

</div>

<div class="mb-3">

<label>Description</label>

<textarea
class="form-control"
rows="4"
placeholder="Describe the artwork">
</textarea>

</div>

<div class="mb-3">

<label>Select Competition</label>

<select class="form-select">

<option>
Summer Art Competition
</option>

<option>
Nature Drawing Challenge
</option>

<option>
Creative Kids Contest
</option>

</select>

</div>

<div class="mb-3">

<label>Upload Artwork</label>

<input
type="file"
class="form-control"
onchange="previewImage(event)">

</div>

<img
id="preview"
class="preview">

<button
type="submit"
class="btn btn-primary w-100 mt-4">

Submit Artwork

</button>

</form>

<div class="mt-4">

<div class="alert alert-info">

<strong>Competition Tag:</strong>

#SummerArt2026

<br>

Competition submissions automatically
display competition hashtags and details.

</div>

</div>

</div>

</div>

<script src="/js/app.js"></script>

</body>
</html>
