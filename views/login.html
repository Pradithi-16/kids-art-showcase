```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Creative Kids Portal</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4,#a6c1ee);
    font-family:Arial, sans-serif;
}

.login-container{
    width:100%;
    max-width:450px;
    background:rgba(255,255,255,0.95);
    padding:40px;
    border-radius:25px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.logo{
    text-align:center;
    font-size:2rem;
    font-weight:bold;
    color:#ff6b6b;
    margin-bottom:20px;
}

.form-control{
    border-radius:15px;
    padding:12px;
}

.btn-login{
    width:100%;
    border:none;
    padding:12px;
    border-radius:15px;
    background:#ff6b6b;
    color:white;
    font-size:1rem;
    font-weight:bold;
}

.btn-login:hover{
    background:#ff5252;
}

.bottom-link{
    text-align:center;
    margin-top:15px;
}

</style>
</head>

<body>

<div class="login-container">

<div class="logo">
🎨 Creative Kids
</div>

<h3 class="text-center mb-4">
Welcome Back
</h3>

<form id="loginForm">

<div class="mb-3">
<label>Email</label>
<input
type="email"
class="form-control"
id="email"
required>
</div>

<div class="mb-3">
<label>Password</label>
<input
type="password"
class="form-control"
id="password"
required>
</div>

<button
type="submit"
class="btn-login">

Login

</button>

</form>

<div class="bottom-link">

Don't have an account?

<a href="signup.html">
Sign Up
</a>

</div>

</div>

<script>

document
.getElementById("loginForm")
.addEventListener(
"submit",
function(e){

e.preventDefault();

localStorage.setItem(
"isLoggedIn",
"true"
);

alert(
"Login Successful!"
);

window.location.href = "dashboard.html";
});

</script>

</body>
</html>
```
