<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Certificate</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f5f5f5;
padding:50px;
}

.certificate{
background:white;
padding:60px;
max-width:900px;
margin:auto;
border:12px solid gold;
border-radius:20px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,.1);
}

.title{
font-size:3rem;
font-weight:bold;
color:#6c63ff;
}

.child-name{
font-size:2rem;
font-weight:bold;
margin:25px 0;
}

</style>

</head>

<body>

<div class="certificate">

<h1 class="title">
Certificate of Participation
</h1>

<p class="mt-4">
This certificate is proudly presented to
</p>

<div class="child-name">
Emma Johnson
</div>

<p>
For actively participating in
</p>

<h3>
🏆 Summer Art Competition 2026
</h3>

<p class="mt-4">
and demonstrating creativity,
enthusiasm and artistic excellence.
</p>

<div class="row mt-5">

<div class="col-md-6">
____________________
<br>
Teacher Signature
</div>

<div class="col-md-6">
____________________
<br>
Principal Signature
</div>

</div>

<button
onclick="window.print()"
class="btn btn-primary mt-5">

Download Certificate

</button>

</div>

</body>
</html>
